<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GenPlay Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 16px;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .product {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }
        .product:active {
            transform: scale(0.98);
        }
        .product-info h3 {
            margin-bottom: 5px;
            font-size: 18px;
        }
        .product-info p {
            color: var(--tg-theme-hint-color, #666);
            font-size: 13px;
        }
        .price {
            font-weight: bold;
            font-size: 20px;
            color: var(--tg-theme-button-color, #2481cc);
        }
        button {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }
        .note {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #999);
        }
        .divider {
            height: 1px;
            background: var(--tg-theme-hint-color, #ddd);
            opacity: 0.3;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛒 GENPLAY SHOP</h1>
            <p>Cloud Phone 24/7 - Chạy auto không lo giật lag</p>
        </div>

        <div class="product" id="product30">
            <div class="product-info">
                <h3>🎮 Gói 30 Ngày</h3>
                <p>Chạy 24/7, ổn định, tiết kiệm pin</p>
            </div>
            <div class="price">150,000đ</div>
        </div>

        <div class="product" id="product90">
            <div class="product-info">
                <h3>⚡ Gói 90 Ngày</h3>
                <p>Tiết kiệm 50k, tặng thêm 5 ngày</p>
            </div>
            <div class="price">400,000đ</div>
        </div>

        <div class="divider"></div>

        <button id="buyButton">📦 MUA NGAY</button>
        
        <div class="note">
            💳 Thanh toán qua chuyển khoản ngân hàng<br>
            🔑 Nhận key tự động sau khi thanh toán
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();
        
        let selectedProduct = null;
        
        document.getElementById('product30').addEventListener('click', function() {
            selectedProduct = '30_ngay';
            tg.showAlert('✅ Đã chọn Gói 30 Ngày - 150,000đ\nBấm "MUA NGAY" để tiếp tục');
            document.getElementById('product30').style.border = '2px solid var(--tg-theme-button-color, #2481cc)';
            document.getElementById('product90').style.border = 'none';
        });
        
        document.getElementById('product90').addEventListener('click', function() {
            selectedProduct = '90_ngay';
            tg.showAlert('✅ Đã chọn Gói 90 Ngày - 400,000đ\nBấm "MUA NGAY" để tiếp tục');
            document.getElementById('product90').style.border = '2px solid var(--tg-theme-button-color, #2481cc)';
            document.getElementById('product30').style.border = 'none';
        });
        
        document.getElementById('buyButton').addEventListener('click', function() {
            if (!selectedProduct) {
                tg.showAlert('⚠️ Vui lòng chọn gói dịch vụ trước!');
                return;
            }
            tg.sendData(JSON.stringify({ action: 'buy', product: selectedProduct }));
            tg.showAlert('📝 Cảm ơn bạn! Vui lòng kiểm tra tin nhắn từ bot để hoàn tất thanh toán.');
        });
    </script>
</body>
</html>
