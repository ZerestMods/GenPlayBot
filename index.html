<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GenPlay Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0a0a0a;color:#fff;font-family:system-ui;padding-bottom:70px;}
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;display:flex;justify-content:space-around;padding:8px 0 15px;}
        .nav-item{text-align:center;flex:1;cursor:pointer;opacity:0.6;}
        .nav-item.active{opacity:1;color:#2481cc;}
        .content{padding:20px;max-width:500px;margin:0 auto;}
        .screen{display:none;}
        .screen.active{display:block;}
        .balance-card{background:linear-gradient(135deg,#2481cc,#1a5a8a);padding:15px;border-radius:20px;display:flex;justify-content:space-between;margin-bottom:20px;}
        .balance-value{font-size:26px;font-weight:bold;}
        .game-item{background:#1a1a1a;border-radius:20px;padding:18px;margin-bottom:10px;cursor:pointer;}
        .pack-item{background:#1a1a1a;border-radius:16px;padding:15px;margin-bottom:10px;display:flex;justify-content:space-between;cursor:pointer;}
        .pack-item.selected{background:rgba(36,129,204,0.3);border-left:3px solid #2481cc;}
        .quantity-section{background:#1a1a1a;border-radius:20px;padding:16px;display:flex;justify-content:space-between;margin:15px 0;}
        .quantity-btn{background:#2481cc;width:44px;height:44px;border-radius:22px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;}
        .buy-btn{background:#2481cc;border:none;padding:16px;border-radius:20px;font-size:18px;font-weight:bold;width:100%;cursor:pointer;color:white;}
        .input-group{background:#1a1a1a;border-radius:20px;padding:16px;margin-bottom:20px;}
        .input-group input{width:100%;padding:15px;border-radius:14px;border:none;background:#0a0a0a;color:white;}
        .history-item{background:#1a1a1a;border-radius:16px;padding:14px;margin-bottom:10px;}
        .status-pending{color:#f39c12;}
        .status-success{color:#2ecc71;}
        .status-failed{color:#e74c3c;}
        .btn-view{background:#333;padding:4px 12px;border-radius:20px;font-size:11px;display:inline-block;margin-top:6px;cursor:pointer;}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:200;align-items:center;justify-content:center;}
        .modal.active{display:flex;}
        .modal-content{background:#1a1a1a;border-radius:24px;padding:24px;width:90%;max-width:360px;}
        .qr-code{text-align:center;margin:15px 0;}
        .qr-code img{width:200px;background:white;padding:10px;border-radius:20px;}
        .timer{color:#f39c12;font-weight:bold;text-align:center;margin:10px 0;}
        .admin-stock-item{display:flex;justify-content:space-between;align-items:center;background:#1a1a1a;border-radius:16px;padding:12px;margin-bottom:10px;}
        .admin-stock-control{display:flex;gap:10px;align-items:center;}
        .admin-stock-control button{background:#333;border:none;color:white;width:36px;height:36px;border-radius:18px;cursor:pointer;}
    </style>
</head>
<body>
<div class="content">
    <div id="mainScreen" class="screen active">
        <div class="balance-card"><div>💰 Số dư</div><div class="balance-value" id="mainBalance">0</div></div>
        <div class="game-item" id="selectGameBtn">🎮 GenPlay Cloud Phone</div>
    </div>
    <div id="detailScreen" class="screen">
        <div class="balance-card"><div>💰 Số dư</div><div class="balance-value" id="detailBalance">0</div></div>
        <div id="backBtn" style="margin-bottom:15px;">← Quay lại</div>
        <div id="packList"></div>
        <div class="quantity-section"><div>Số lượng</div><div><div class="quantity-btn" id="minusQty">-</div><span style="font-size:22px;margin:0 20px;" id="quantityVal">1</span><div class="quantity-btn" id="plusQty">+</div></div></div>
        <button class="buy-btn" id="buyBtn">💸 MUA NGAY</button>
    </div>
    <div id="depositScreen" class="screen">
        <div class="balance-card"><div>💰 Số dư</div><div class="balance-value" id="depositBalance">0</div></div>
        <div class="input-group"><input type="number" id="depositAmount" placeholder="Nhập số tiền" value="50000"></div>
        <button class="buy-btn" id="createDepositBtn">📝 TẠO ĐƠN NẠP</button>
        <div style="margin-top:20px;"><h3>📜 Lịch sử nạp</h3><div id="depositHistoryList"></div></div>
    </div>
    <div id="historyScreen" class="screen">
        <div class="balance-card"><div>💰 Số dư</div><div class="balance-value" id="historyBalance">0</div></div>
        <h3>📦 Lịch sử mua</h3><div id="purchaseHistoryList"></div>
    </div>
    <div id="adminScreen" class="screen">
        <div class="balance-card" style="background:#f39c12;color:#1a1a1a;"><div>⚙️ ADMIN</div><div class="balance-value"></div></div>
        <div id="adminStockList"></div>
    </div>
</div>
<div class="bottom-nav">
    <div class="nav-item" data-screen="main"><span>🛒</span><p>Mua Key</p></div>
    <div class="nav-item" data-screen="deposit"><span>💰</span><p>Nạp tiền</p></div>
    <div class="nav-item" data-screen="history"><span>📜</span><p>Lịch sử</p></div>
    <div class="nav-item" id="adminNav" data-screen="admin" style="display:none;"><span>⚙️</span><p>Admin</p></div>
</div>
<div id="depositModal" class="modal"><div class="modal-content"><div style="text-align:right;cursor:pointer;" onclick="closeDepositModal()">✖</div><div id="depositModalBody"></div></div></div>
<div id="confirmModal" class="modal"><div class="modal-content"><h3>Xác nhận</h3><p id="confirmText"></p><div style="display:flex;gap:10px;margin-top:15px;"><div class="buy-btn" style="background:#444;" id="cancelBtn">Hủy</div><div class="buy-btn" id="confirmBtn">Mua</div></div></div></div>

<script>
    let tg = window.Telegram.WebApp; tg.expand();
    let user = tg.initDataUnsafe?.user || { first_name: "Khách", id: "Unknown" };
    let userId = user.id || "Guest_" + Date.now();
    const ADMIN_ID = 7655649084;
    let isAdmin = (user.id == ADMIN_ID);
    
    let key = `genplay_${userId}`;
    let data = JSON.parse(localStorage.getItem(key) || `{"balance":0,"totalDeposit":0,"joinDate":"${new Date().toISOString().slice(0,10)}","purchase":[],"deposit":[]}`);
    if(!data.purchase) data.purchase = [];
    if(!data.deposit) data.deposit = [];
    
    let packs = [
        {days:1, price:25000, stock:0, name:"1 NGÀY"},
        {days:7, price:55000, stock:0, name:"7 NGÀY"},
        {days:15, price:120000, stock:0, name:"15 NGÀY"},
        {days:30, price:185000, stock:0, name:"30 NGÀY"}
    ];
    
    function loadStocks() {
        let saved = localStorage.getItem('genplay_stocks');
        if(saved) { let s = JSON.parse(saved); packs.forEach(p => { if(s[p.days] !== undefined) p.stock = s[p.days]; }); }
    }
    function saveStocks() { let s = {}; packs.forEach(p => { s[p.days] = p.stock; }); localStorage.setItem('genplay_stocks', JSON.stringify(s)); }
    loadStocks();
    
    let selectedPack = packs[0], quantity = 1, depositTimer = null;
    function saveData() { localStorage.setItem(key, JSON.stringify(data)); saveStocks(); }
    function fm(v) { return v.toLocaleString('vi-VN'); }
    
    function updateUI() {
        let b = fm(data.balance);
        ['mainBalance','detailBalance','depositBalance','historyBalance'].forEach(id => { let el = document.getElementById(id); if(el) el.innerText = b; });
    }
    
    function renderPacks() {
        let html = '';
        packs.forEach(p => {
            let cls = (selectedPack.days === p.days ? 'selected' : '');
            html += `<div class="pack-item ${cls}" data-days="${p.days}"><div><b>⚡ ${p.name}</b><br><span style="font-size:12px;">📦 Còn ${p.stock}</span></div><div>${fm(p.price)}đ</div></div>`;
        });
        document.getElementById('packList').innerHTML = html;
        document.querySelectorAll('.pack-item').forEach(el => {
            el.onclick = () => { let days = parseInt(el.dataset.days); selectedPack = packs.find(p => p.days === days); renderPacks(); };
        });
    }
    
    function renderPurchase() {
        let div = document.getElementById('purchaseHistoryList');
        if(!div) return;
        if(data.purchase.length === 0) { div.innerHTML = '<div class="history-item">Chưa mua hàng</div>'; return; }
        div.innerHTML = data.purchase.map(h => `<div class="history-item"><b>🎮 GenPlay ${h.days} ngày x${h.qty}</b> <span style="float:right;">${fm(h.total)}đ</span><div style="font-size:12px;">🔑 Key: ${h.code}</div><div style="font-size:11px;">${h.time}</div></div>`).join('');
    }
    
    function renderDeposit() {
        let div = document.getElementById('depositHistoryList');
        if(!div) return;
        if(data.deposit.length === 0) { div.innerHTML = '<div class="history-item">Chưa nạp tiền</div>'; return; }
        div.innerHTML = data.deposit.map((h,idx) => {
            let st = h.status === 'pending' ? '<span class="status-pending">⏳ Chờ</span>' : (h.status === 'success' ? '<span class="status-success">✅ Done</span>' : '<span class="status-failed">❌ Hủy</span>');
            let view = (h.status === 'pending' && h.qrData) ? `<div class="btn-view" onclick='viewAgain(${idx})'>📷 Xem lại</div>` : '';
            return `<div class="history-item">💰 +${fm(h.amount)}đ ${st}<div style="font-size:11px;">${h.time}</div>${view}</div>`;
        }).join('');
    }
    
    function showQR(rec) {
        let remain = rec.qrData.expireTime - Date.now();
        let m = Math.floor(Math.max(0,remain)/60000), s = Math.floor(Math.max(0,remain)%60000/1000);
        document.getElementById('depositModalBody').innerHTML = `<div style="text-align:center;"><p><strong>🏦 MoMo</strong></p><p>📱 0901371650</p><p>📛 DUONG THI TU TRINH</p><p>💰 ${fm(rec.amount)}đ</p><p>📝 Nội dung: <code>NAP${userId}</code></p><div class="qr-code"><img src="${rec.qrData.qrUrl}"></div><div class="timer" id="timerDisplay">⏰ Hết hạn: ${m}:${s<10?'0'+s:s}</div><button class="buy-btn" style="margin-top:12px;" onclick="closeDepositModal()">Đóng</button></div>`;
        document.getElementById('depositModal').classList.add('active');
        if(depositTimer) clearInterval(depositTimer);
        depositTimer = setInterval(() => {
            let r = rec.qrData.expireTime - Date.now();
            if(r <= 0) {
                clearInterval(depositTimer);
                let idx = data.deposit.findIndex(d => d.orderId === rec.orderId);
                if(idx !== -1 && data.deposit[idx].status === 'pending') { data.deposit[idx].status = 'failed'; saveData(); renderDeposit(); }
                let td = document.getElementById('timerDisplay');
                if(td) { td.innerHTML = '⏰ HẾT HẠN!'; td.style.color = '#e74c3c'; }
                return;
            }
            let mm = Math.floor(r/60000), ss = Math.floor(r%60000/1000);
            let td = document.getElementById('timerDisplay');
            if(td) td.innerHTML = `⏰ Hết hạn: ${mm}:${ss<10?'0'+ss:ss}`;
        }, 1000);
    }
    
    function createDeposit() {
        let amount = parseInt(document.getElementById('depositAmount').value);
        if(amount<10000) return tg.showAlert('Tối thiểu 10,000đ');
        let orderId = 'NAP'+userId+Date.now();
        let qrUrl = `https://img.vietqr.io/image/momo-0901371650-compact.png?amount=${amount}&addInfo=NAP${userId}&accountName=DUONG%20THI%20TU%20TRINH`;
        let rec = { amount, status:'pending', time:new Date().toLocaleString('vi-VN'), orderId, qrData:{ amount, qrUrl, expireTime:Date.now()+15*60*1000 } };
        data.deposit.unshift(rec);
        saveData();
        renderDeposit();
        showQR(rec);
    }
    
    function purchase() {
        let total = selectedPack.price * quantity;
        if(selectedPack.stock < quantity) return tg.showAlert(`Chỉ còn ${selectedPack.stock} SP!`);
        if(data.balance < total) return tg.showAlert(`Thiếu ${fm(total-selectedPack.stock)}đ`);
        data.balance -= total;
        selectedPack.stock -= quantity;
        let code = 'GEN' + Math.random().toString(36).substr(2,6).toUpperCase();
        data.purchase.unshift({ days:selectedPack.days, qty:quantity, total, time:new Date().toLocaleString('vi-VN'), code });
        saveData();
        updateUI();
        renderPacks();
        renderPurchase();
        tg.showAlert(`✅ Mua thành công!\n🔑 Key: ${code}`);
        document.getElementById('confirmModal').classList.remove('active');
    }
    
    function renderAdmin() {
        let div = document.getElementById('adminStockList');
        if(!div) return;
        let html = '';
        packs.forEach(p => {
            html += `<div class="admin-stock-item"><div><b>⚡ ${p.name}</b><br>${fm(p.price)}đ</div><div class="admin-stock-control"><button class="min" data-d="${p.days}">-</button><span id="stk_${p.days}">${p.stock}</span><button class="plus" data-d="${p.days}">+</button></div></div>`;
        });
        div.innerHTML = html;
        document.querySelectorAll('.min').forEach(btn => { btn.onclick = () => { let d=parseInt(btn.dataset.d); let p=packs.find(x=>x.days===d); if(p.stock>0) p.stock--; document.getElementById(`stk_${d}`).innerText=p.stock; saveStocks(); renderPacks(); }; });
        document.querySelectorAll('.plus').forEach(btn => { btn.onclick = () => { let d=parseInt(btn.dataset.d); let p=packs.find(x=>x.days===d); p.stock++; document.getElementById(`stk_${d}`).innerText=p.stock; saveStocks(); renderPacks(); }; });
    }
    
    window.viewAgain = (idx) => { let rec = data.deposit[idx]; if(rec && rec.status==='pending') showQR(rec); else tg.showAlert('Đơn hết hạn'); };
    function closeDepositModal() { if(depositTimer) clearInterval(depositTimer); document.getElementById('depositModal').classList.remove('active'); }
    
    function showScreen(s) {
        document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'));
        document.getElementById(s+'Screen').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(nav=>{ if(nav.dataset.screen===s) nav.classList.add('active'); else nav.classList.remove('active'); });
        if(s==='history') renderPurchase();
        if(s==='deposit') renderDeposit();
        if(s==='admin' && isAdmin) renderAdmin();
        updateUI();
    }
    
    document.getElementById('selectGameBtn')?.onclick = () => { renderPacks(); quantity=1; document.getElementById('quantityVal').innerText=quantity; showScreen('detail'); };
    document.getElementById('backBtn')?.onclick = () => showScreen('main');
    document.getElementById('minusQty')?.onclick = () => { if(quantity>1) quantity--; document.getElementById('quantityVal').innerText=quantity; };
    document.getElementById('plusQty')?.onclick = () => { quantity++; document.getElementById('quantityVal').innerText=quantity; };
    document.getElementById('buyBtn')?.onclick = () => { let t=selectedPack.price*quantity; document.getElementById('confirmText').innerHTML = `GenPlay ${selectedPack.days} ngày x${quantity}<br>Tổng: ${fm(t)}đ`; document.getElementById('confirmModal').classList.add('active'); };
    document.getElementById('confirmBtn')?.onclick = purchase;
    document.getElementById('cancelBtn')?.onclick = () => document.getElementById('confirmModal').classList.remove('active');
    document.getElementById('createDepositBtn')?.onclick = createDeposit;
    document.querySelectorAll('.nav-item').forEach(nav => nav.onclick = () => showScreen(nav.dataset.screen));
    
    if(isAdmin) document.getElementById('adminNav').style.display = 'block';
    updateUI();
    renderPacks();
    renderPurchase();
    renderDeposit();
    showScreen('main');
</script>
</body>
</html>
